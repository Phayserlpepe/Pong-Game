<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-size: 2.5em;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            cursor: none;
        }

        .scoreboard {
            display: flex;
            gap: 60px;
            font-size: 1.5em;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.7);
        }

        .score-item {
            text-align: center;
        }

        .score-item h3 {
            font-size: 0.8em;
            margin-bottom: 5px;
            color: #88ff00;
        }

        .score {
            font-size: 2em;
            font-weight: bold;
        }

        .controls {
            color: #fff;
            text-align: center;
            font-size: 0.9em;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #00ff88;
        }

        .controls p {
            margin: 5px 0;
        }

        .reset-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 1em;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: #88ff00;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.7);
        }

        .reset-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div class="scoreboard">
            <div class="score-item">
                <h3>PLAYER</h3>
                <div class="score" id="playerScore">0</div>
            </div>
            <div class="score-item">
                <h3>COMPUTER</h3>
                <div class="score" id="computerScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="controls">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Move Mouse Up/Down or ⬆️⬇️ Arrow Keys to control left paddle</p>
            <p>Computer controls the right paddle</p>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;

        const player = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6,
            score: 0
        };

        const computer = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 4.5,
            score: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            radius: ballSize,
            speed: 5
        };

        // Input handling
        const keys = {};
        const mouse = {
            y: canvas.height / 2
        };

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.y = e.clientY - rect.top;
        });

        // Update game state
        function update() {
            // Player paddle control - priority: mouse movement, fallback to arrow keys
            if (Math.abs(mouse.y - (player.y + player.height / 2)) > 5) {
                // Mouse movement takes priority
                const targetY = mouse.y - player.height / 2;
                const diff = targetY - player.y;
                player.dy = Math.sign(diff) * player.speed;
            } else if (keys['ArrowUp']) {
                player.dy = -player.speed;
            } else if (keys['ArrowDown']) {
                player.dy = player.speed;
            } else {
                player.dy = 0;
            }

            // Update player paddle position
            player.y += player.dy;

            // Player paddle collision with walls
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
            }

            // Computer AI
            const computerCenter = computer.y + computer.height / 2;
            const ballCenter = ball.y;
            const aiDifficulty = 0.8;

            if (Math.abs(computerCenter - ballCenter) > computer.speed * aiDifficulty) {
                if (computerCenter < ballCenter) {
                    computer.dy = computer.speed;
                } else {
                    computer.dy = -computer.speed;
                }
            } else {
                computer.dy = 0;
            }

            // Update computer paddle position
            computer.y += computer.dy;

            // Computer paddle collision with walls
            if (computer.y < 0) computer.y = 0;
            if (computer.y + computer.height > canvas.height) {
                computer.y = canvas.height - computer.height;
            }

            // Ball movement
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }

            // Ball collision with paddles
            if (
                ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player.x + player.width + ball.radius;
                
                // Add spin based on paddle movement
                const deltaY = ball.y - (player.y + player.height / 2);
                ball.dy += deltaY * 0.1;
            }

            if (
                ball.x + ball.radius > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computer.x - ball.radius;
                
                // Add spin based on paddle movement
                const deltaY = ball.y - (computer.y + computer.height / 2);
                ball.dy += deltaY * 0.1;
            }

            // Ball out of bounds - scoring
            if (ball.x < 0) {
                computer.score++;
                resetBall();
            }
            if (ball.x > canvas.width) {
                player.score++;
                resetBall();
            }

            // Update scoreboard
            document.getElementById('playerScore').textContent = player.score;
            document.getElementById('computerScore').textContent = computer.score;
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            ctx.strokeStyle = '#00ff88';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw paddles
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = 'rgba(0, 255, 136, 0.5)';
            ctx.shadowBlur = 10;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);
            ctx.shadowBlur = 0;

            // Draw ball
            ctx.fillStyle = '#ff00ff';
            ctx.shadowColor = 'rgba(255, 0, 255, 0.7)';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = (Math.random() - 0.5) * ball.speed;
        }

        // Reset entire game
        function resetGame() {
            player.score = 0;
            computer.score = 0;
            player.y = canvas.height / 2 - paddleHeight / 2;
            computer.y = canvas.height / 2 - paddleHeight / 2;
            resetBall();
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('computerScore').textContent = '0';
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
